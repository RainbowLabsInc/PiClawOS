####################################################################
#  PiClaw OS - Konfiguration
#  Bearbeite diese Datei BEVOR du install.sh ausfuehrst.
#
#  Syntax: VARIABLE = "Wert"
#  Zeilen die mit # beginnen werden ignoriert.
#  Alles in Anfuehrungszeichen lassen!
####################################################################


# ==================================================================
# 1. KI-ANBIETER  (das Wichtigste!)
# ==================================================================

# Dein API-Key.
# Anthropic:  sk-ant-api03-...   -> https://console.anthropic.com/keys
# OpenAI:     sk-proj-...        -> https://platform.openai.com/api-keys
# Leer lassen: lokales Phi-3 Mini Modell wird verwendet (kein Internet noetig)

PICLAW_LLM_KEY = ""


# Anbieter: "anthropic" | "openai" | "ollama" | "local"
# Wird automatisch erkannt wenn ein gueltiger Key eingetragen ist.
# Nur aendern wenn du Ollama oder ein lokales Modell erzwingen willst.

PICLAW_LLM_PROVIDER = "auto"


# Modell (leer = automatisch je nach Anbieter)
# Anthropic: claude-sonnet-4-20250514 | claude-haiku-4-5-20251001
# OpenAI:    gpt-4o | gpt-4o-mini
# Ollama:    llama3.2 | mistral | gemma3

PICLAW_LLM_MODEL = ""


# ==================================================================
# 2. AGENT
# ==================================================================

# Name deines KI-Agenten (erscheint im Chat und Dashboard)

PICLAW_AGENT_NAME = "PiClaw"


# ==================================================================
# 3. TELEGRAM  (optional - fuer Benachrichtigungen & Chat per Handy)
# ==================================================================
# Anleitung:
#   1. Schreibe @BotFather auf Telegram -> /newbot
#   2. Du erhaeltst einen Token: 1234567890:ABCDE...
#   3. Schreibe deinem neuen Bot eine Nachricht
#   4. Schreibe @userinfobot auf Telegram -> erhaeltst deine Chat-ID

PICLAW_TELEGRAM_TOKEN   = ""
PICLAW_TELEGRAM_CHAT_ID = ""


# ==================================================================
# 4. NETZWERK  (nur wenn WLAN nicht im Raspberry Pi Imager gesetzt)
# ==================================================================
# Tipp: WLAN am besten direkt im Raspberry Pi Imager einstellen!
# Nur hier ausfullen wenn du es vergessen hast.

PICLAW_WIFI_SSID     = ""
PICLAW_WIFI_PASSWORD = ""


# ==================================================================
# 5. ERWEITERT  (Standardwerte sind fuer die meisten Nutzer richtig)
# ==================================================================

# Port des Web-Dashboards (Standard: 7842)
PICLAW_API_PORT = "7842"

# Hostname des Pi im Netzwerk (Standard: piclaw)
# Erreichbar dann als: piclaw.local
PICLAW_HOSTNAME = "piclaw"

# Luefter-Steuerung via GPIO (fuer aktiv gekuehlte Gehaeuse)
# "true" oder "false"
PICLAW_FAN_ENABLED = "false"

# GPIO-Pin fuer Luefter (BCM-Nummerierung, Standard: Pin 14)
PICLAW_FAN_PIN = "14"

# Automatische Updates pruefen: "true" oder "false"
PICLAW_AUTO_UPDATE = "false"

####################################################################
# Nach dem Bearbeiten: Datei speichern, SD-Karte sicher auswerfen,
# in den Pi stecken, starten, SSH verbinden, dann:
#
#   sudo bash /boot/piclaw/install.sh
#
####################################################################


# ==================================================================
# 6. HOME ASSISTANT  (optional - Smart Home Steuerung)
# ==================================================================
# Verbindet PiClaw mit deiner Home Assistant Instanz.
# Danach kannst du per Telegram/Discord schreiben:
#   "Mach das Wohnzimmerlicht aus"
#   "Wie warm ist es im Schlafzimmer?"
#   "Starte die Abendroutine"
#
# Token erstellen in HA:
#   Profil (unten links) -> Sicherheit -> Langlebige Zugriffstoken -> Token erstellen

PICLAW_HA_URL   = ""
PICLAW_HA_TOKEN = ""

# Push-Benachrichtigungen: Komma-getrennte Liste der Ereignisse
# die per Telegram/Discord gemeldet werden sollen.
# Optionen: motion_detected, door_opened, alarm_triggered, smoke_detected, flood_detected
# Leer lassen = alle aktiv

PICLAW_HA_NOTIFY_EVENTS = "motion_detected,door_opened,alarm_triggered,smoke_detected,flood_detected"
